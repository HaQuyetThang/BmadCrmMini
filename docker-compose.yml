services:
  postgres:
    image: postgres:16-alpine
    container_name: bmadcrmmini-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bmadcrmmini
    volumes:
      - bmadcrmmini_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bmadcrmmini"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bmadcrmmini_pgdata:
